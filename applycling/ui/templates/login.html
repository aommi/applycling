{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>Log In</h1>
</div>

<div class="onboarding-shell">
  <section class="submit-card onboarding-card">
    <h2>Sign in to your account</h2>

    {% if error %}
    <p class="form-msg error" style="color:#c62828;font-family:'Gloria Hallelujah',cursive;font-size:13px;margin-bottom:12px;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
      <div class="profile-grid">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" value="{{ email or '' }}" required autocomplete="email" />

        <label for="password">Password</label>
        <input id="password" type="password" name="password" required autocomplete="current-password" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Sign In</button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
