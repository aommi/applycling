<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>applycling — coming soon</title>
  <meta name="description" content="applycling is coming soon. A clingy little buddy for your job search." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Gloria+Hallelujah&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAF7F1;
      --ink: #1A1A1A;
      --accent: #4d70ff;
      --highlight: #FFE27A;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--ink);
      font-family: 'Gloria Hallelujah', cursive;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    ::selection { background: var(--highlight); }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(26,26,26,0.04) 1px, transparent 1px);
      background-size: 3px 3px;
      pointer-events: none;
      z-index: 0;
    }
    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 22px 28px;
    }
    .login-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Caveat', cursive;
      font-size: 22px;
      line-height: 1;
      color: var(--ink);
      background: var(--bg);
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 10px 20px 12px;
      text-decoration: none;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .login-link:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--ink);
    }
    .login-link:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--ink);
    }
    main {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 140px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 24px 64px;
      text-align: center;
    }
    .mark {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .mark svg { display: block; }
    .wordmark {
      font-family: 'Caveat', cursive;
      font-size: 56px;
      line-height: 0.9;
      letter-spacing: -0.5px;
    }
    h1 {
      font-family: 'Caveat', cursive;
      font-size: clamp(56px, 10vw, 112px);
      line-height: 0.95;
      margin: 0 0 18px;
      letter-spacing: -1px;
      max-width: 14ch;
      text-wrap: balance;
    }
    h1 .soon {
      display: inline-block;
      position: relative;
    }
    h1 .soon::before {
      content: "";
      position: absolute;
      left: -4%;
      right: -4%;
      bottom: 8%;
      height: 38%;
      background: var(--highlight);
      transform: rotate(-1deg);
      border-radius: 4px;
      z-index: 0;
    }
    h1 .soon > span {
      position: relative;
      z-index: 1;
    }
    .tag {
      font-family: 'Gloria Hallelujah', cursive;
      font-size: 18px;
      line-height: 1.55;
      max-width: 38ch;
      margin: 0 auto 38px;
      opacity: 0.85;
      text-wrap: pretty;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Caveat', cursive;
      font-size: 24px;
      line-height: 1;
      color: var(--bg);
      background: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 14px 24px 16px;
      text-decoration: none;
      box-shadow: 4px 4px 0 var(--accent);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      cursor: pointer;
    }
    .cta:hover {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 var(--accent);
    }
    .cta:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--accent);
    }
    .cta svg { display: block; }
    .sub-note {
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      opacity: 0.55;
    }
    footer {
      margin-top: 48px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      opacity: 0.45;
      padding-bottom: 24px;
    }
    @media (max-width: 520px) {
      .topbar { padding: 16px 20px; }
      .wordmark { font-size: 44px; }
      .mark { gap: 10px; margin-bottom: 24px; }
      .cta { font-size: 21px; padding: 12px 20px 14px; }
      .login-link { font-size: 20px; padding: 9px 16px 11px; }
      footer { font-size: 10px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="login-link" href="https://app.applycling.com">log in</a>
  </header>

  <main>
    <div class="mark">
      <svg width="68" height="68" viewBox="0 0 100 100" aria-hidden="true">
        <g fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 18 40 Q 16 58 28 64 Q 50 72 72 64 Q 84 58 82 40 Q 80 15 50 14 Q 20 15 18 40 Z" />
          <circle cx="50" cy="38" r="10" />
          <path d="M 44 54 Q 50 58 56 54" />
          <path d="M 24 62 Q 16 70 20 82" />
          <path d="M 38 66 Q 34 80 42 86" />
          <path d="M 62 66 Q 66 80 58 86" />
          <path d="M 76 62 Q 84 70 80 82" />
        </g>
        <circle cx="52" cy="40" r="3" fill="#1A1A1A" />
        <circle cx="54" cy="37" r="1.2" fill="#FAF7F1" />
      </svg>
      <span class="wordmark">applycling</span>
    </div>

    <h1>something clingy is <span class="soon"><span>coming soon</span></span>.</h1>

    <p class="tag">a little buddy for your job search.</p>

    <a class="cta" href="https://github.com/aommi/applycling" target="_blank" rel="noopener">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

      </svg>
      use the CLI today
      <svg width="18" height="14" viewBox="0 0 20 14" fill="none" aria-hidden="true">
        <path d="M 1 7 L 18 7 M 12 1 L 18 7 L 12 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </a>
    <div class="sub-note">apply from anywhere — BYOK on terminal</div>
  </main>

  <footer>© applycling · 2026</footer>
</body>
</html>
