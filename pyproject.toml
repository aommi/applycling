[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "apply-companion"
version = "0.1.0"
description = "CLI tool that tailors your resume to job descriptions using a local Ollama LLM."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1",
    "ollama>=0.3.0",
    "rich>=13.7",
]

[project.scripts]
apply-companion = "apply_companion.cli:main"

[tool.setuptools.packages.find]
include = ["apply_companion*"]
